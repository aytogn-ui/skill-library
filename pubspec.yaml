name: skill_library
description: 動画ベースでパフォーマンス技を記録・管理するスキルライブラリアプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ローカルストレージ
  hive: 2.2.3
  hive_flutter: 1.1.0

  # 状態管理
  provider: 6.1.5+1

  # 動画関連
  video_player: 2.9.5
  image_picker: 1.1.2
  video_thumbnail: 0.5.3

  # UI
  cupertino_icons: 1.0.8
  flutter_slidable: 4.0.3
  percent_indicator: 4.2.3
  fl_chart: 0.69.0
  characters: 1.4.0

  # ユーティリティ
  uuid: 4.5.1
  intl: 0.19.0
  path_provider: 2.1.5
  path: 1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
